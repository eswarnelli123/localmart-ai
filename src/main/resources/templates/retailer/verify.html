<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Verify OTP | LocalMart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow-sm">
                <h3 class="mb-3" th:text="${name} != null ? 'Welcome, ' + ${name} + '!' : 'Retailer Email Verification'"></h3>
                <p class="text-muted mb-3" th:text="${name} != null ? 'Enter the OTP sent to ' + ${email} + ' to complete your retailer sign-up.' : 'Enter the OTP sent to your business email.'"></p>
                <form id="verifyRetailerForm">
                    <div class="mb-3" th:if="${email} == null">
                        <label class="form-label">Business Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <input type="hidden" id="email" name="email" th:value="${email}" th:if="${email} != null" />
                    <div class="mb-3">
                        <label class="form-label">OTP Code</label>
                        <input type="text" class="form-control" id="otp" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Verify Retailer Account</button>
                </form>
                <div id="message" class="alert mt-3 d-none"></div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('verifyRetailerForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const payload = {
            email: document.getElementById('email').value,
            otp: document.getElementById('otp').value
        };
        const messageEl = document.getElementById('message');
        try {
            const response = await fetch('/api/retailer/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.success) {
                window.location.href = '/login?verified=true';
                return;
            }
            messageEl.classList.remove('d-none', 'alert-danger', 'alert-success');
            messageEl.classList.add('alert-danger');
            messageEl.innerText = result.message;
        } catch (err) {
            messageEl.classList.remove('d-none', 'alert-success');
            messageEl.classList.add('alert-danger');
            messageEl.innerText = 'Unable to verify retailer OTP.';
        }
    });
</script>
</body>
</html>
