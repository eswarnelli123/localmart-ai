<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Offers | LocalMart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="/">LocalMart AI</a>
        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/retailer/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/retailer/shops">Shops</a></li>
                <li class="nav-item"><a class="nav-link" href="/retailer/products">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/retailer/offers">Offers</a></li>
                <li class="nav-item"><a class="nav-link" href="/retailer/analytics">Analytics</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="row mb-4">
        <div class="col">
            <h3>Manage Offers</h3>
            <p class="text-muted">Create promotional offers for your shop and review active campaigns.</p>
        </div>
    </div>

    <div class="card p-4 shadow-sm mb-4">
        <h5>Create Offer</h5>
        <form id="offerForm">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Shop</label>
                    <select id="shopSelect" class="form-select" required>
                        <option value="">Loading shops...</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control" id="offerTitle" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Discount</label>
                    <input type="number" step="0.01" class="form-control" id="offerDiscount" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Category</label>
                    <select id="offerCategory" class="form-select">
                        <option value="">Select category...</option>
                        <option value="fashion">Fashion</option>
                        <option value="groceries">Groceries</option>
                        <option value="electronics">Electronics</option>
                        <option value="health">Health</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Product (optional)</label>
                    <select id="productSelect" class="form-select" disabled>
                        <option value="">Select a category first</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Discount Type</label>
                    <select id="discountType" class="form-select">
                        <option value="percentage">Percentage</option>
                        <option value="fixed_amount">Fixed Amount</option>
                        <option value="buy_x_get_y">Buy X Get Y</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" id="offerDescription" rows="3"></textarea>
                </div>
                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-success">Create Offer</button>
                </div>
            </div>
        </form>
        <div id="offerMessage" class="alert mt-3 d-none"></div>
    </div>

    <div class="card p-4 shadow-sm">
        <h5>Your Offers</h5>
        <div id="offersList">Loading offers...</div>
    </div>
</div>

<script>
    const shopSelect = document.getElementById('shopSelect');
    const offerForm = document.getElementById('offerForm');
    const offerMessage = document.getElementById('offerMessage');
    const offersList = document.getElementById('offersList');

    async function loadShops() {
        try {
            const res = await fetch('/api/retailer/shops', { credentials: 'same-origin' });
            if (!res.ok) throw new Error('Unable to load shops');
            const shops = await res.json();
            if (!shops.length) {
                shopSelect.innerHTML = '<option value="">Create a shop first</option>';
                return;
            }
            shopSelect.innerHTML = '<option value="">Select a shop...</option>' + shops.map(shop =>
                `<option value="${shop.id}">${shop.name} — ${shop.location || shop.addressLine1 || 'Unknown location'}</option>`
            ).join('');
        } catch (err) {
            shopSelect.innerHTML = '<option value="">Unable to load shops</option>';
            console.error(err);
        }
    }

    async function loadOffers() {
        try {
            const res = await fetch('/api/retailer/offers', { credentials: 'same-origin' });
            if (!res.ok) throw new Error('Unable to load offers');
            const offers = await res.json();
            if (!offers.length) {
                offersList.innerHTML = '<p class="text-muted">No offers yet. Create one above.</p>';
                return;
            }
            offersList.innerHTML = '<div class="list-group">' + offers.map(offer => `
                <div class="list-group-item">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">${escapeHtml(offer.title)}</h6>
                            <p class="mb-1 text-muted">${escapeHtml(offer.description || '')}</p>
                            <small>Type: ${escapeHtml(offer.offerType)} | Discount: ${escapeHtml(offer.discountType)} ${offer.discount || ''} | Shop: ${escapeHtml(offer.shopName)}</small>
                        </div>
                    </div>
                </div>`).join('') + '</div>';
        } catch (err) {
            offersList.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
        }
    }

    async function loadProductsForCategory(category) {
        const productSelect = document.getElementById('productSelect');
        const selectedShopId = shopSelect.value;
        const selectedValue = productSelect.value;

        if (!selectedShopId) {
            productSelect.innerHTML = '<option value="">Select a shop first</option>';
            productSelect.disabled = true;
            return;
        }

        try {
            let products = [];
            let res = await fetch(`/api/retailer/products/by-category?category=${encodeURIComponent(category || '')}`, { credentials: 'same-origin' });
            if (res.ok) {
                products = await res.json();
            }
            if (!products.length) {
                res = await fetch('/api/retailer/products', { credentials: 'same-origin' });
                if (!res.ok) throw new Error('Unable to load products');
                products = await res.json();
            }

            const shopProducts = products.filter(product => {
                if (!product.shop) return true;
                return String(product.shop.id) === String(selectedShopId);
            });

            if (!shopProducts.length) {
                productSelect.innerHTML = '<option value="">No products for this shop</option>';
                productSelect.disabled = true;
                return;
            }

            productSelect.innerHTML = '<option value="">(No product - apply to shop)</option>' + shopProducts.map(p => `<option value="${p.id}" ${String(selectedValue) === String(p.id) ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('');
            productSelect.disabled = false;
        } catch (err) {
            productSelect.innerHTML = '<option value="">Unable to load products</option>';
            productSelect.disabled = true;
            console.error(err);
        }
    }

    document.getElementById('offerCategory').addEventListener('change', function () {
        loadProductsForCategory(this.value);
    });

    shopSelect.addEventListener('change', function () {
        loadProductsForCategory(document.getElementById('offerCategory').value);
    });

    function escapeHtml(value) {
        if (value == null) return '';
        return value.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    offerForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        const shopId = shopSelect.value;
        if (!shopId) {
            showMessage('Please select a shop first.', false);
            return;
        }

        const payload = {
            title: document.getElementById('offerTitle').value,
            description: document.getElementById('offerDescription').value,
            category: document.getElementById('offerCategory').value,
            discount: parseFloat(document.getElementById('offerDiscount').value),
            discountType: document.getElementById('discountType').value,
            productId: document.getElementById('productSelect').value ? parseInt(document.getElementById('productSelect').value) : null
        };

        try {
            const res = await fetch(`/api/retailer/shop/${shopId}/offer`, {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const text = await res.text();
                throw new Error(text || 'Unable to create offer');
            }
            const offer = await res.json();
            showMessage(`Offer created: ${offer.title}`, true);
            offerForm.reset();
            await loadOffers();
        } catch (err) {
            showMessage(err.message, false);
        }
    });

    function showMessage(text, success) {
        offerMessage.classList.remove('d-none', 'alert-success', 'alert-danger');
        offerMessage.classList.add(success ? 'alert-success' : 'alert-danger');
        offerMessage.textContent = text;
    }

    loadShops();
    loadOffers();
</script>
</body>
</html>
