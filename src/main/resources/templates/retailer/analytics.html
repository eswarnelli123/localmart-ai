<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Analytics | LocalMart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row mb-4">
        <div class="col">
            <h3>Retailer Analytics</h3>
            <p class="text-muted">Monitor shop counts, product catalog size, and inventory levels.</p>
        </div>
    </div>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 shadow-sm">
                <h5>Total shops</h5>
                <p id="totalShops" class="display-6 text-success">0</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4 shadow-sm">
                <h5>Total products</h5>
                <p id="totalProducts" class="display-6 text-success">0</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4 shadow-sm">
                <h5>Total stock</h5>
                <p id="totalStock" class="display-6 text-success">0</p>
            </div>
        </div>
    </div>
    <div class="card p-4 shadow-sm mt-4">
        <h5>Analytics data</h5>
        <p class="text-muted mb-0">Analytics values are updated automatically from your retailer dashboard.</p>
    </div>
</div>
<script>
    async function loadAnalytics() {
        try {
            const response = await fetch('/api/retailer/analytics');
            if (!response.ok) return;
            const data = await response.json();
            document.getElementById('totalShops').innerText = data.totalShops;
            document.getElementById('totalProducts').innerText = data.totalProducts;
            document.getElementById('totalStock').innerText = data.totalStock;
        } catch (err) {
            console.error('Unable to fetch analytics', err);
        }
    }
    loadAnalytics();
</script>
</body>
</html>
