<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Register | LocalMart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card p-4 shadow-sm">
                <h3 class="mb-3">Retailer Registration</h3>
                <form id="registerRetailerForm">
                    <div class="mb-3">
                        <label class="form-label">Shop Owner Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Business Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" required>
                            <button class="btn btn-outline-secondary" type="button" id="toggleRetailerPassword" aria-label="Toggle password visibility">
                                <span id="toggleRetailerPasswordIcon" class="d-flex align-items-center justify-content-center">👁️</span>
                            </button>
                        </div>
                        <div class="form-text text-muted">Use at least 8 characters with uppercase, lowercase, a number, and a special symbol like @, #, $, or !.</div>
                        <div class="progress mt-2">
                            <div id="retailerPasswordStrengthBar" class="progress-bar bg-danger" style="width: 0%"></div>
                        </div>
                        <small id="retailerPasswordStrengthText" class="form-text"></small>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Create Retailer Account</button>
                </form>
                <div id="message" class="alert mt-3 d-none"></div>
            </div>
        </div>
    </div>
</div>
<script>
    const retailerPasswordField = document.getElementById('password');
    const retailerStrengthBar = document.getElementById('retailerPasswordStrengthBar');
    const retailerStrengthText = document.getElementById('retailerPasswordStrengthText');

    function evaluateRetailerStrength(password) {
        let score = 0;
        if (password.length >= 8) score += 1;
        if (/[A-Z]/.test(password)) score += 1;
        if (/[a-z]/.test(password)) score += 1;
        if (/\d/.test(password)) score += 1;
        if (/[!@#$%^&*()_+\-=[\]{};:'"\\|,.<>/?]/.test(password)) score += 1;
        return score;
    }

    function updateRetailerStrengthMeter(password) {
        const score = evaluateRetailerStrength(password);
        const percent = (score / 5) * 100;
        retailerStrengthBar.style.width = percent + '%';
        retailerStrengthBar.className = 'progress-bar ' +
            (score <= 2 ? 'bg-danger' : score === 3 ? 'bg-warning' : 'bg-success');
        if (!password) {
            retailerStrengthText.textContent = '';
            return;
        }
        if (score <= 2) {
            retailerStrengthText.textContent = 'Weak password';
        } else if (score === 3) {
            retailerStrengthText.textContent = 'Fair password';
        } else {
            retailerStrengthText.textContent = 'Strong password';
        }
    }

    const retailerEyeOpen = '👁️';
    const retailerEyeClosed = '🙈';

    retailerPasswordField.addEventListener('input', function () {
        updateRetailerStrengthMeter(retailerPasswordField.value);
    });

    document.getElementById('toggleRetailerPassword').addEventListener('click', function () {
        const type = retailerPasswordField.getAttribute('type') === 'password' ? 'text' : 'password';
        retailerPasswordField.setAttribute('type', type);
        document.getElementById('toggleRetailerPasswordIcon').textContent = type === 'password' ? retailerEyeOpen : retailerEyeClosed;
    });

    document.getElementById('registerRetailerForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = retailerPasswordField.value;
        const messageEl = document.getElementById('message');
        const strengthRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=[\]{};:'"\\|,.<>/?]).{8,}$/;
        if (!strengthRegex.test(password)) {
            messageEl.classList.remove('d-none', 'alert-success');
            messageEl.classList.add('alert-danger');
            messageEl.innerText = 'Password must be at least 8 characters and include uppercase, lowercase, a number, and one special symbol like @, #, $, or !.';
            return;
        }
        const payload = { name, email, password };
        try {
            const response = await fetch('/api/retailer/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            messageEl.classList.remove('d-none', 'alert-danger', 'alert-success');
            messageEl.classList.add(result.success ? 'alert-success' : 'alert-danger');
            messageEl.innerText = result.message;
            if (result.success) {
                setTimeout(() => window.location.href = '/retailer/verify?email=' + encodeURIComponent(payload.email) + '&name=' + encodeURIComponent(payload.name), 1200);
            }
        } catch (err) {
            messageEl.classList.remove('d-none', 'alert-success');
            messageEl.classList.add('alert-danger');
            messageEl.innerText = 'Unable to register retailer.';
        }
    });
</script>
</body>
</html>
