<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | LocalMart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">LocalMart AI</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Products</a></li>
                <li class="nav-item"><a class="nav-link active" href="/wishlist">Wishlist</a></li>
                <li class="nav-item"><a class="nav-link" href="/coupons">Coupons</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-sm p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h3 class="mb-1">Your Wishlist</h3>
                        <p class="text-muted mb-0">Products you’ve saved for later.</p>
                    </div>
                    <a class="btn btn-outline-success" href="/dashboard">Continue browsing</a>
                </div>
                <div class="row g-4" th:if="${products != null && !products.empty}">
                    <div class="col-md-6" th:each="product : ${products}">
                        <div class="card h-100">
                            <div class="row g-0">
                                <div class="col-4 bg-light" style="min-height: 140px;">
                                    <img th:if="${product.imagePath != null}" th:src="@{${product.imagePath}}" th:alt="${product.name}" class="img-fluid h-100 w-100" style="object-fit: cover;">
                                    <div th:unless="${product.imagePath != null}" class="h-100 d-flex align-items-center justify-content-center text-muted">No image</div>
                                </div>
                                <div class="col-8">
                                    <div class="card-body d-flex flex-column h-100">
                                        <h5 class="card-title mb-1" th:text="${product.name}">Product name</h5>
                                        <p class="text-muted mb-1" th:text="${product.brand != null ? product.brand : 'Unknown brand'}">Brand</p>
                                        <p class="mb-2"><strong>Price:</strong> ₹<span th:text="${product.effectivePrice != null ? product.effectivePrice : product.price}">0.00</span></p>
                                        <div class="mt-auto d-flex justify-content-between align-items-center">
                                            <a class="btn btn-sm btn-success" th:href="@{/product/{id}(id=${product.id})}">View</a>
                                            <button class="btn btn-sm btn-outline-danger" th:onclick="'removeWishlist(this,' + ${product.id} + ');'">Remove</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:unless="${products != null && !products.empty}">
                    <div class="alert alert-info mb-0">Your wishlist is empty. Browse products and save favorites for later.</div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:inline="javascript">
    async function removeWishlist(button, productId) {
        button.disabled = true;
        button.textContent = 'Removing...';
        try {
            const response = await fetch('/api/wishlist?productId=' + productId, {
                method: 'DELETE',
                credentials: 'same-origin'
            });
            if (!response.ok) {
                throw new Error('Unable to remove item from wishlist');
            }
            window.location.reload();
        } catch (error) {
            button.disabled = false;
            button.textContent = 'Remove';
            alert(error.message || 'Unable to remove item from wishlist');
        }
    }
</script>
</body>
</html>
