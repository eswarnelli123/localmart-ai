<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | LocalMart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow-sm">
                <h3 class="mb-3">Forgot Password</h3>
                <form id="forgotForm">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Send OTP</button>
                </form>
                <div id="message" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('forgotForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const payload = { email };
        const response = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        const messageEl = document.getElementById('message');
        messageEl.innerText = result.message || 'OTP sent';
        messageEl.className = result.success ? 'alert alert-success mt-3' : 'alert alert-danger mt-3';
        if (result.success) {
            setTimeout(() => {
                window.location.href = '/reset-password?email=' + encodeURIComponent(email);
            }, 1300);
        }
    });
</script>
</body>
</html>
