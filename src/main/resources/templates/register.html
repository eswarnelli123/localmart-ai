<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | LocalMart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 shadow-sm">
                <h3 class="mb-3">Create Your Account</h3>
                <form id="registerForm" th:action="@{/register}" method="post" autocomplete="off">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name" autocomplete="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" autocomplete="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mobile Phone</label>
                        <input type="tel" class="form-control" id="phone" name="phone" autocomplete="tel" pattern="^\+?[0-9]{10,15}$" required>
                        <div class="form-text text-muted">Enter a valid mobile number with 10 to 15 digits. You may include a leading +.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" name="password" autocomplete="new-password" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword" aria-label="Toggle password visibility">
                                <span id="togglePasswordIcon" class="d-flex align-items-center justify-content-center">👁️</span>
                            </button>
                        </div>
                        <div class="form-text text-muted">Use at least 8 characters with uppercase, lowercase, a number, and a special character like @, #, $, or !.</div>
                        <div class="progress mt-2">
                            <div id="passwordStrengthBar" class="progress-bar bg-danger" style="width: 0%"></div>
                        </div>
                        <small id="passwordStrengthText" class="form-text"></small>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Register</button>
                </form>
                <div id="clientMessage" class="alert mt-3 d-none"></div>
                <div th:if="${message}" class="alert mt-3" th:classappend="${success} ? 'alert-success' : 'alert-danger'" th:text="${message}"></div>
                <div th:unless="${message}" class="alert alert-info mt-3">Enter your details and click Register.</div>
                <div class="mt-3 text-center">
                    <a href="/login">Already have an account? Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    const passwordField = document.getElementById('password');
    const strengthBar = document.getElementById('passwordStrengthBar');
    const strengthText = document.getElementById('passwordStrengthText');
    const clientMessage = document.getElementById('clientMessage');

    function evaluateStrength(password) {
        let score = 0;
        if (password.length >= 8) score += 1;
        if (/[A-Z]/.test(password)) score += 1;
        if (/[a-z]/.test(password)) score += 1;
        if (/\d/.test(password)) score += 1;
        if (/[!@#$%^&*()_+\-=[\]{};:'"\\|,.<>/?]/.test(password)) score += 1;
        return score;
    }

    function updateStrengthMeter(password) {
        const score = evaluateStrength(password);
        const percent = (score / 5) * 100;
        strengthBar.style.width = percent + '%';
        strengthBar.className = 'progress-bar ' +
            (score <= 2 ? 'bg-danger' : score === 3 ? 'bg-warning' : 'bg-success');
        if (!password) {
            strengthText.textContent = '';
            return;
        }
        if (score <= 2) {
            strengthText.textContent = 'Weak password';
        } else if (score === 3) {
            strengthText.textContent = 'Fair password';
        } else {
            strengthText.textContent = 'Strong password';
        }
    }

    passwordField.addEventListener('input', function () {
        updateStrengthMeter(passwordField.value);
    });

    const eyeOpen = '👁️';
    const eyeClosed = '🙈';

    document.getElementById('togglePassword').addEventListener('click', function () {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        document.getElementById('togglePasswordIcon').textContent = type === 'password' ? eyeOpen : eyeClosed;
    });

    document.getElementById('registerForm').addEventListener('submit', function (e) {
        const password = passwordField.value;
        const strengthRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=[\]{};:'"\\|,.<>/?]).{8,}$/;
        if (!strengthRegex.test(password)) {
            e.preventDefault();
            clientMessage.classList.remove('d-none', 'alert-success');
            clientMessage.classList.add('alert-danger');
            clientMessage.textContent = 'Password must be at least 8 characters and include uppercase, lowercase, a number, and one special symbol like @, #, $, or !.';
        }
    });
</script>
</body>
</html>
