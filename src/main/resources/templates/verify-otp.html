<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | LocalMart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow-sm">
                <h3 class="mb-3" th:text="${name} != null ? 'Welcome, ' + ${name} + '!' : 'Verify Your Email'"></h3>
                <form th:action="@{/verify-otp}" method="post">
                    <div class="mb-3" th:if="${email} == null">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <input type="hidden" name="email" th:value="${email}" th:if="${email} != null" />
                    <div class="mb-3">
                        <label class="form-label">OTP</label>
                        <input type="text" class="form-control" id="otp" name="otp" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Verify</button>
                </form>
                <div th:if="${message}" class="alert mt-3" th:classappend="${success} ? 'alert-success' : 'alert-danger'" th:text="${message}"></div>
                <div th:unless="${message}" class="alert alert-info mt-3">Enter the OTP sent to your email.</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
