<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | LocalMart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 shadow-sm">
                <h1 class="display-6 text-danger">Something went wrong</h1>
                <p class="lead" th:text="${message}">An unexpected error occurred.</p>
                <hr>
                <div><strong>Status:</strong> <span th:text="${status}"></span></div>
                <div><strong>Error:</strong> <span th:text="${error}"></span></div>
                <div><strong>Path:</strong> <span th:text="${path}"></span></div>
                <div><strong>Time:</strong> <span th:text="${timestamp}"></span></div>
                <div class="mt-4">
                    <a href="/" class="btn btn-primary">Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
