<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | LocalMart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow-sm">
                <h3 class="mb-3">Reset Password</h3>
                <form id="resetForm">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">OTP</label>
                        <input type="text" class="form-control" id="otp" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" class="form-control" id="newPassword" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Reset Password</button>
                </form>
                <div id="message" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>
<script>
    const emailInput = document.getElementById('email');
    const urlParams = new URLSearchParams(window.location.search);
    const emailParam = urlParams.get('email');
    if (emailParam) {
        emailInput.value = emailParam;
    }

    document.getElementById('resetForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const otp = document.getElementById('otp').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const messageEl = document.getElementById('message');

        if (newPassword !== confirmPassword) {
            messageEl.className = 'alert alert-danger mt-3';
            messageEl.innerText = 'Passwords do not match. Please confirm your new password.';
            return;
        }

        const payload = {
            email: document.getElementById('email').value,
            otp,
            newPassword
        };
        const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        messageEl.className = result.success ? 'alert alert-success mt-3' : 'alert alert-danger mt-3';
        messageEl.innerText = result.message || 'Password reset complete';
        if (result.success) {
            setTimeout(() => window.location.href = '/login', 1400);
        }
    });
</script>
</body>
</html>
